name: Site

# Scoped to the website branch. The plugin branches carry their own CI and
# share no history with this one, so the two never run against each other.
on:
  push:
    branches: [website]
  pull_request:
    branches: [website]
  # Lets the site be rebuilt and redeployed without a code change — after
  # rotating the Cloudflare token, for instance, or to reissue a
  # deployment that failed for reasons outside the repository.
  workflow_dispatch:

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          # Read from .nvmrc so CI and local development cannot disagree
          # about the Node version. Astro 7 requires >= 22.12.
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # astro check type-checks templates and validates every content
      # collection entry against its schema, so a post missing a date or a
      # doc missing its `order` fails here rather than rendering wrong.
      - name: Type and content check
        run: npm run check

      - name: Build
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://olmbox.pages.dev' }}

      - name: Check the build actually produced pages
        # A misconfigured content collection can yield a technically
        # successful build with almost nothing in it.
        run: |
          count=$(find dist -name '*.html' | wc -l | tr -d ' ')
          echo "Built ${count} HTML pages"
          if [ "$count" -lt 8 ]; then
            echo "::error::Only ${count} pages built; expected at least 8"
            exit 1
          fi
          test -f dist/sitemap-index.xml || { echo "::error::sitemap missing"; exit 1; }

      - uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    # Only deploy real pushes to the website branch, never pull requests
    # from forks, and only when the credentials actually exist — otherwise
    # the job is skipped rather than failing red on every run.
    if: github.event_name == 'push' && github.ref == 'refs/heads/website'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v7

      - name: Check for Cloudflare credentials
        id: creds
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Read as variables purely to diagnose the commonest mistake:
          # the Actions settings page has Secrets and Variables tabs side
          # by side, and a value added to the wrong one reads as absent
          # here with no other clue as to why.
          TOKEN_AS_VAR: ${{ vars.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_AS_VAR: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Report presence only. Values are never printed, and GitHub
          # masks secrets in logs regardless.
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            case "$name" in
              CLOUDFLARE_API_TOKEN)  value="$TOKEN";   as_var="$TOKEN_AS_VAR" ;;
              CLOUDFLARE_ACCOUNT_ID) value="$ACCOUNT"; as_var="$ACCOUNT_AS_VAR" ;;
            esac

            if [ -n "$value" ]; then
              echo "  ${name}: present (${#value} chars)"
            else
              missing=1
              if [ -n "$as_var" ]; then
                echo "::error::${name} is set as a repository *variable*, not a secret." \
                     "Variables are not masked in logs — delete it from the Variables tab" \
                     "and re-add it under Secrets."
              else
                echo "::warning::${name} is not set for this repository."
              fi
            fi
          done

          if [ "$missing" = "0" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy — see the warnings above." \
                 "Secrets go in Settings → Secrets and variables → Actions → Secrets tab."
          fi

      - uses: actions/download-artifact@v8
        if: steps.creds.outputs.ready == 'true'
        with:
          name: site-dist
          path: dist

      - name: Publish
        id: deploy
        if: steps.creds.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=olmbox
