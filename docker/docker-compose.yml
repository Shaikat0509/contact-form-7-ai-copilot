# Disposable WordPress environment for verifying plugin changes.
#
# This is dev tooling and never ships: the plugin has no runtime
# dependency on Docker. Credentials below are deliberately trivial —
# nothing here is reachable off localhost, and the whole stack is meant
# to be destroyed and rebuilt (`./docker/wp.sh reset`) rather than
# maintained.
#
# The plugin is bind-mounted under its WordPress.org slug rather than the
# repo's own directory name, which is also how the distribution zip is
# laid out — so this environment exercises the shipped directory
# structure, not the local one.

name: olmbox-ai-inbox

services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:6.8-php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      # WP_DEBUG_LOG is what gates SubmissionService::log_error(), so AI
      # failures are only visible in this environment with it on.
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
    volumes:
      - wp_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/olmbox-ai-inbox-for-contact-form-7

  # One-shot container: `docker compose run --rm cli <wp args>`.
  # Shares the webroot volume and network so it sees the same install.
  #
  # Behind a profile so `docker compose up` never tries to start it —
  # it runs to completion and exits, which `up --wait` reports as a
  # failed service.
  cli:
    profiles: ["tools"]
    image: wordpress:cli-php8.2
    depends_on:
      db:
        condition: service_healthy
    user: "33:33"
    environment:
      # www-data has no home dir in this image; without this WP-CLI warns
      # on every invocation that it cannot create its cache directory.
      HOME: /tmp
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wp_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/olmbox-ai-inbox-for-contact-form-7
    entrypoint: ["wp"]
    command: ["--info"]

volumes:
  db_data:
  wp_data:
